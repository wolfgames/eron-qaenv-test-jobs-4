# pipeline-context.yml — LLM-friendly project snapshot
# Generated by pipeline-build-game phase 10 (prime).
# Keeps shared context in one place so each phase doesn't re-discover the project.
# Update after significant structural changes.

# Aliases — concrete values substituted into the glossary template at dispatch
# time so sub-agents never guess paths or detect runners. Populated by:
#   initRun()     — runDir, pass, skillRoot, repoRoot, rules, tsRunner
#   05-pass-gate  — previousRunLog
#   10-prime      — buildCmd, testCmd
# Derived aliases ($pipelineRoot, $phasesDir, $refs, …) are computed from these
# anchors inside $refs/templates/glossary.tpl.md — they are NOT duplicated here.
aliases:
  runDir: /tmp/workspace/eron-qaenv-test-jobs-4/pipeline/runs/run-01
  pass: core
  skillRoot: /tmp/workspace/eron-qaenv-test-jobs-4/node_modules/@wolfgames/cortex/amino/skills/pipeline-build-game
  repoRoot: /tmp/workspace/eron-qaenv-test-jobs-4
  rules: /tmp/workspace/eron-qaenv-test-jobs-4/.claude/rules
  tsRunner: bun
  previousRunLog: null
  buildCmd: "bun run build"
  testCmd: "bun run test:run"

# Pass context — mirrored by phase 10 (prime) from $runLog.pass and
# $phaseSummary.pass_gate.previous_pass_stable. Downstream phases read these
# via the normal read($runContext) path. Names are canonical (core | secondary
# | meta | superfan) — numerics appear only in GDD step frontmatter.
pass: core
previous_pass_stable: null

# Game identity (name, slug, genre) is NOT stored in $runContext. Rationale:
# prime runs before the GDD's q-game-name is resolved (by 30-plan), so prime
# has nothing truthful to write; and plan is not an owner of game-identity
# keys per run-context-ownership.md. Downstream phases read the slug from
# `plan.carry_forward.game_slug` and derive game directories as
# `$runContext.paths.game + "/" + game_slug`. One source of truth, zero drift.
#
# Stack — detected by 10-prime from the host project.
# Values are informational; phases branch on them via stack-profiles and
# the host project's own .cursor/rules/*.mdc guardrails.
stack:
  renderer: "pixi"
  ui: "solidjs"
  bundler: "vite"
  runtime: "bun"
  testing: "vitest"
  animation: "gsap"
  build_cmd: "bun run build"
  test_cmd: "bun run test:run"
  summary: "pixi + solidjs + gsap + bun (vite, vitest)"

# Paths — detected by 10-prime from the host project layout.
paths:
  tests: "tests/"
  modules: "src/modules/"
  core: "src/core/"
  game: "src/game/"
  docs: "docs/"

existing-features: []

# guardrail-refs is NOT stored in $runContext. The authoritative rule manifest is
# the host project's `$rules/` folder (resolved in the glossary at every dispatch),
# and each phase's `Load before reasoning:` list names the specific rule files it
# needs. A separate static "guardrail-refs" list here would duplicate and drift.

dom-overlays:
  - element: WolfGamesLogo
    file: src/game/screens/GameScreen.tsx
    position: bottom
    height-px: 32
    css: "absolute bottom-8 left-1/2 -translate-x-1/2"

