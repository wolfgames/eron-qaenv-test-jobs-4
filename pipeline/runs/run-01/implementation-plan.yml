        - src/game/mysterymunch/state/logic/clueTiles.test.ts
        - src/game/mysterymunch/state/logic/winCondition.test.ts
        - src/game/mysterymunch/state/logic/lossCondition.test.ts
        - src/game/mysterymunch/systems/ContinueSystem.test.ts
    how:
      - "Write hauntedCells.ts: pure function; marks cells as haunted in board state; adjacent-match detection via matchDetection result; returns clear-haunt events"
      - "Write clueTiles.ts: pure function; maps cell positions to clue types; on haunt-clear checks if cell has clue; returns collect-clue event with target HUD slot index"
      - "Write winCondition.ts: checks hauntedCellsCleared >= levelConfig.hauntedCellCount AND clueTilesCollected >= levelConfig.requiredClues; secondary: score >= target AND clues complete"
      - "Write lossCondition.ts: checks movesRemaining == 0 AND win not met"
      - "Update MysteryMunchPlugin transactions: addHauntClearEvent, collectClue, triggerWin, triggerLoss; update boardPhase resource on win/loss"
      - "Update ResultsScreen.tsx: add win branch (star animations, score counter, clue reveals, 'Next Level' button) and loss branch ('Almost there, pal!' copy, 3-option stagger); consume gameState signals bridged from ECS; retain 'results' screen ID"
      - "Write ContinueSystem.ts: handles 3 loss options; Keep Going = no-op ad stub + ecsDb.transactions.addMoves(5); Use Coins = deduct 30 from snackCoins signal + addMoves(5); Try Next Time = goto('start')"
      - "Update HudRenderer: clue tray strip (4 slots at top-right, clue emoji thumbnails); 100ms shake on move-counter zero; star icons fill gold as thresholds crossed"
