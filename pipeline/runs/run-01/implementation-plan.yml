          - "L/T shape triggers Mystery Machine creation"
          - "2×2 square triggers Ghost Buster creation"
          - "Scooby Snack tap clears all of one random color"
          - "special in cascade path does not auto-activate"
          - "two specials matched: both effects trigger in sequence"
    files:
