    risk_reason: >
      Special bubble chain interactions have 3 defined combos with sequential animation timing.
      CompanionRenderer must not create DOM elements inside GPU context (guardrail #1).
      Verify: unit test for each special type in isolation; check CompanionRenderer is pure Pixi Text.

