  # ─────────────────────────────────────────────────────────────────────────
  # BATCH 5 — Level generation + tutorial levels T1 & T2
  # Player can: complete a procedural level or guided tutorial with onboarding
  # ─────────────────────────────────────────────────────────────────────────
  - id: 5
    name: "Level generation + tutorial T1/T2 + chapter progression"
    priority: P0
    player_visible: >
      First run shows Tutorial T1 (5×5 board, ghost-finger pointer demos first swap,
      no HUD) then T2 (6×6, 2 Ghost Slime blockers, ghost-finger demos adjacent clear).
      After tutorials, level 1 (procedurally generated) loads with HUD visible. Chapter
      icon and level counter shown in HUD.
    features: [level-generation, tutorial-flow, blockers, chapter-progression]
    cos_covered: [core-interaction, canvas, animated-dynamics]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [tutorial-swap-target, board-cell]
      feedback_surfaces: [board, ghost-finger-pointer, scooby-speech-bubble, cell-blocker-overlay]
    acceptance:
      # level-generation
      - given: "level 1 is generated with seed (1*31337 XOR (0*9973))"
        should: "board passes solvability check (greedy solver finds a solution within 500 iterations)"
      - given: "level generation runs 3 attempts with 10 retries each"
        should: "if all fail, chapter baseline template is used (8×8 full, 4 colors, 0 specials, 25 moves)"
      - given: "board generation checks color minimum"
        should: "if <3 bubbles of any required color exist, extra seeds of that color are added"
      # tutorial-flow (core-interaction onboarding)
      - given: "first app launch reaches tutorial T1"
        should: "ghost-finger pointer animates toward a bubble, then drags to adjacent; no text instructions"
      - given: "player completes first swap in T1"
        should: "Scooby speech bubble appears with celebration copy; tutorial advances"
      - given: "T2 loads"
        should: "2 Ghost Slime blockers visible; ghost-finger points at cell adjacent to slime; HUD still hidden"
      # blockers (canvas — distinct visual per blocker type)
      - given: "a Ghost Slime blocker is on the board"
        should: "cell shows ghost-fog emoji overlay with HP counter; visually distinct from normal bubble and haunted cell"
      - given: "an adjacent match hits a Ghost Slime blocker"
        should: "150ms crack animation plays; HP decrements; at 0 HP, 250ms dissolve plays and cell reveals beneath"
      # chapter-progression
      - given: "player completes level 15 of chapter 1"
        should: "villain reveal sequence fires; 'Next Mystery' CTA leads to chapter 2 interstitial"
    test_loci:
      - describe: "levelGen: generation and solvability"
        file: "src/game/mysterymunch/state/logic/levelGen.test.ts"
        cases:
          - "generates valid 8x8 board for level 1"
          - "solvability check passes for generated board"
          - "falls back to baseline template after 10 failed retries"
          - "color minimum enforced: no color has <3 bubbles when needed"
          - "seed formula: level 1 seed = (1*31337) XOR (0*9973)"
      - describe: "blockerLogic: hit and clear"
        file: "src/game/mysterymunch/state/logic/blockerLogic.test.ts"
        cases:
          - "Ghost Slime HP decrements on adjacent match"
          - "Ghost Slime clears (dissolve event) at 0 HP"
          - "Monster Lock cannot be hit by normal matches (requires Key Bubble)"
    files:
      state:
        - src/game/mysterymunch/state/logic/levelGen.ts
        - src/game/mysterymunch/state/logic/solvabilityCheck.ts
        - src/game/mysterymunch/state/logic/blockerLogic.ts
        - src/game/mysterymunch/data/handcrafted/L1.ts
        - src/game/mysterymunch/data/handcrafted/L2.ts
        - src/game/mysterymunch/data/tutorial/T1.ts
        - src/game/mysterymunch/data/tutorial/T2.ts
        - src/game/mysterymunch/data/chapterConfig.ts
        - src/game/mysterymunch/data/blockerTypes.ts
        - src/game/mysterymunch/state/MysteryMunchPlugin.ts
      integration:
        - src/game/mysterymunch/systems/TutorialSystem.ts
        - src/game/mysterymunch/renderers/BoardRenderer.ts
        - src/game/mysterymunch/renderers/BlockRenderer.ts
        - src/game/mysterymunch/GameController.ts
      test:
        - src/game/mysterymunch/state/logic/levelGen.test.ts
        - src/game/mysterymunch/state/logic/blockerLogic.test.ts
    how:
      - "Write levelGen.ts: 7-step algorithm (param sampling, grid shape, blocker placement, bubble fill, haunted overlay, clue placement, solvability check); seed formula; fallback to baseline; color-minimum enforcement; pure function, seeded RNG only"
      - "Write solvabilityCheck.ts: greedy solver; 500 iterations max; 3 attempt + 10 retry logic; returns solvable boolean"
      - "Write T1.ts and T2.ts: frozen board configs (no procedural override); T1=5×5 3-color swap tutorial; T2=6×6 2-ghost-slime blocker tutorial"
      - "Write TutorialSystem.ts: tracks tutorial step; shows ghost-finger GSAP animated pointer (Text '👆' that tweens toward target cell); constrains allowed moves to tutorial path; fires completion events"
      - "Write blockerLogic.ts: pure function; maps blocker type to HP; adjacent-match hit detection; returns damage-event; checks Monster Lock cannot-hit rule"
      - "Write blockerTypes.ts: defines 4 blocker types (Ghost Slime, Phantom Web, Haunted Crate, Monster Lock) with emoji fallback glyphs"
      - "Write chapterConfig.ts: 5 chapters, 15 levels each; chapter-gated blocker types; seed formula parameters"
      - "Update BlockRenderer to render blocker cells with emoji overlay + HP counter text"
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at TutorialSystem.ts, BoardRenderer.ts, GameController.ts"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for core-interaction (tutorial onboarding: ghost-finger pointer, no text walls; player understands action ≤3s)"
      - "CoS sub-walk clean for canvas (blocker visually distinct from normal bubble and haunted cell)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: HIGH
    risk_reason: >
      Level generation solvability check is complex (greedy solver, retry logic). Tutorial
      system must gate player input without breaking the core input pipeline. Verify:
      solvability test runs deterministically with fixed seed; tutorial state machine tested
      in isolation before wiring to GameController.

