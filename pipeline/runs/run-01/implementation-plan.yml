      - "Update MysteryMunchPlugin: special-created and special-activated events in action chain; specialBonus=500 per special triggered added to scoringLogic"
      - "Update BlockRenderer: special bubble renders as large Text (⭐ Scooby Snack, 🚐 Mystery Machine, 👻 Ghost Buster) with GSAP idle sparkle; board dim via alpha tween on boardLayer on special-activate"
      - "Write CompanionRenderer.ts: Pixi Container at bottom-right, renders Scooby emoji text ('🐶', '😊', '😟', '😮') as portrait; watches boardPhase resource via ECS observer; fires dialogue-bubble GSAP tween (fade-in + text + auto-dismiss after 2.5s)"
      - "Adapt useCompanionDialogue.ts hook: wire to CompanionRenderer via GameController; pass expression state from ECS boardEvents"
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at BlockRenderer.ts, CompanionRenderer.ts, GameController.ts"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for canvas (special bubbles visually distinct from normal; companion visible, theme-distinct)"
      - "CoS sub-walk clean for animated-dynamics (special-activate event in queue; board dim animated, not instant)"
      - "touch targets ≥44px for special bubble tap target"
      - "bun run build + bun run test:run pass within 3 fix cycles"
