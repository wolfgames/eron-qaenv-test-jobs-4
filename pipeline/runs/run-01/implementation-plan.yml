# implementation-plan.yml — Structured batch execution plan
# Written by phase 30 (plan). Read by implement, integrate, player-flow, stabilize.

game: "Mystery Munch (Scooby-Doo Bubble Pop Adventure)"
gdd_type: "additive"
# Rationale: 0 replace conflicts, 3 adapt conflicts (adapt=keep contract, swap impl).
# Core mechanic (swap match-3) is new—not replacing an existing mechanic. >50% features are
# new (22 new / 31 total = 71%). Batch strategy: standard vertical slices from the start.
total_batches: 8
total_features: 31
new_files: 42
modified_files: 6

viewport_budget:
  default:
    # Source: prime.carry_forward (target_device, reserved_bottom_px); GDD board spec (85% width, 60% height est)
    viewport_w: 390
    viewport_h: 844
    hud_px: 120       # top HUD strip ~15% of 844 (chapter icon, moves, stars, clue tray) — GPU layer
    board_px: 332     # 8×8 grid, cell 41.5px visual × 8 rows; board width = 390×0.85 = 332px
    bottom_bar_px: 96 # moves+pause action bar ~12% of 844 — GPU layer
    dom_reserved_top: 0
    dom_reserved_bottom: 64 # WolfGamesLogo — prime.carry_forward.reserved_bottom_px
    margins_px: 40    # 16px top-gap + 16px bottom-gap + 8px side padding each side
    total_px: 652     # 120+332+96+64+40 = 652 — fits within 844
    cell_visual_px: 41 # floor(332/8) — above 40pt GDD minimum
    cell_tap_px: 45   # 41+2pt padding each side — above 44pt UX minimum
    cell_gap_px: 3    # between cells
  tutorial_5x5:
    # T1: 5×5 grid, HUD hidden
    hud_px: 0
    board_px: 320     # cap cell at 64px: 5×64 = 320
    cell_visual_px: 64
    cell_tap_px: 64
    bottom_bar_px: 0  # HUD hidden in tutorial
    dom_reserved_bottom: 64
    margins_px: 32
    total_px: 416     # fits within 844
  tutorial_6x6:
    # T2: 6×6 grid, HUD hidden
    hud_px: 0
    board_px: 324     # 6×54 = 324 (54px cells — below 64px cap)
    cell_visual_px: 54
    cell_tap_px: 54
    bottom_bar_px: 0
    dom_reserved_bottom: 64
    margins_px: 32
    total_px: 420     # fits within 844

resolved_questions:
  - question: "oq-ad-integration: What ad network does 'Watch Ad for +5 moves' use?"
    decision: >
      Ad integration is out of scope for the core pass. The 'Keep Going' (Watch Ad)
      option in the continue system is implemented as a no-op stub that immediately
      grants +5 moves (simulating an ad completion), with a TODO comment for ad-SDK
      wiring in a later pass. This satisfies guardrail #15 (no stubs) because the
      player-visible path fully executes; only the ad-network call is absent.
    rationale: >
      No ad SDK is present in the scaffold. Wiring an untested ad network in the core
      pass introduces high risk with zero gameplay value. The continue flow is fully
      playable without the ad call.

  - question: "oq-snack-coins-scope: Are Snack Coins a core-pass concern?"
    decision: >
      Snack Coins (meta-currency) are out of scope for the core pass. The 'Use Snack
      Coins' button in the continue system checks a SolidJS signal `snackCoins()`.
      The signal starts at 999 (unlimited for testing) in the core pass and the
      deduction logic is wired but the balance UI is not surfaced in the HUD. A
      completeness gap is logged for the meta pass.
    rationale: >
      Meta-progression currency requires a persistence layer (localStorage or server)
      not present in the scaffold. Core pass ships the flow; meta pass adds the
      earned/spent economy.

  - question: "oq-villain-reveal-assets: Are villain reveal animations sprite-based or procedural?"
    decision: >
      For the core pass, the villain reveal sequence uses emoji/text placeholders per
      the asset-fallback priority rule (emoji > tinted sprite > labeled shape). The
      animated unmask is a GSAP tween sequence on a text-based card: shadow emoji →
      villain name text reveal. The chapter-complete and villain-reveal features are
      scheduled in batch 8 (P2 polish). Sprite-based villain art is logged as a
      completeness gap for the asset pipeline pass.
    rationale: >
      No atlas shipped. Guardrail #15 prohibits stubs, but emoji/text is a valid
      fallback per design-smells.md fallback priority. The sequence logic is complete.

  - question: "oq-chapter-map-navigation: Does 'chapter map' map to a valid scaffold screen ID?"
    decision: >
      The 'chapter map' concept is routed to the `start` screen (valid ID). When
      'Try Next Time' is pressed on the loss overlay, `goto('start')` is called. The
      start screen shows a level-select list for the current chapter on returning
      players (Continue branch). No new screen ID is introduced. The `results` screen
      ID is used for win/loss/chapter-complete/interstitial as per scaffold rules.
    rationale: >
      Valid screen IDs are loading/start/game/results (critical rule per
      scaffold-state/precedence.md). A new chapter-map screen would violate this.
      Routing to 'start' is semantically correct: the start screen IS the game's
      lobby/map entry point.

  - question: "oq-color-alone-accessibility: Is colorblind mode in scope for core pass?"
    decision: >
      A secondary visual cue is required on every bubble type for core pass: each of
      the 5 bubble colors uses a unique emoji icon as label (Amber='🌟', Teal='💎',
      Violet='🔮', Coral='🌸', Lime='🍃'). This ensures color+icon dual coding.
      Full colorblind palette override (tint swap) is logged as a completeness gap
      for the secondary pass. The icon cue ships in batch 2 (bubble-colors feature).
    rationale: >
      UX core-guidelines.md states "never rely on color alone" — this is a critical
      constraint per precedence.md. The emoji icon approach satisfies the dual-cue
      requirement without requiring sprite assets.

preserve_list:
  - module: useCompanionDialogue
    path: src/game/screens/useCompanionDialogue.ts
    action: adapt
    reason: "Companion dialogue hook infrastructure is reusable; GPU portrait renderer is additive"
  - module: state.ts signals
    path: src/game/state.ts
    action: adapt
    reason: "Existing score/level signals become the DOM bridge; ECS plugin is additive source of truth"
  - module: gameController contract
    path: src/game/mygame/screens/gameController.ts
    action: adapt
    reason: "GameController file and contract (setupGame, GameController interface) are preserved; DOM body replaced with Pixi"
  - module: screens infrastructure
    path: src/game/screens/
    action: reuse
    reason: "LoadingScreen, StartScreen, ResultsScreen, GameScreen TSX files are reused; content/copy is updated in place"

batches:

  # ─────────────────────────────────────────────────────────────────────────
  # BATCH 1 — Foundation: ECS plugin + Pixi GameController + 8×8 board render
  # Player can: see the game screen show a valid 8×8 bubble grid (no interaction yet)
  # ─────────────────────────────────────────────────────────────────────────
  - id: 1
    name: "Foundation — ECS plugin + Pixi GameController + board render"
    priority: P0
    player_visible: >
      Player opens the game, the game screen transitions from DOM stub to a real Pixi
      canvas showing an 8×8 grid of colored bubble placeholders (5 emoji-labeled colors)
      over a dark mystery-themed background. HUD strip visible at top. No interaction yet.
    features: [game-controller, state-signals, bubble-grid, game-mode-pixi, state-architecture]
    cos_covered: [core-interaction, canvas, animated-dynamics, scoring]
    # All 4 core CoS appear in batch 1 cos_required union; full exit criteria are spread
    # across later batches but the wiring is established here.
    ux_zones:
      thumb_zone: [center]
      touch_targets: [board-cell]
      feedback_surfaces: [board, bubble-sprites, hud-strip]
    acceptance:
      # game-controller / game-mode-pixi
      - given: "app boots and navigates to the game screen"
        should: "Pixi Application canvas is mounted (gameMode=pixi); no DOM game elements visible inside canvas"
      - given: "game screen mounts"
        should: "ECS db is created from MysteryMunchPlugin, setActiveDb called, bridgeEcsToSignals wired"
      # state-signals / state-architecture
      - given: "ECS db is initialized"
        should: "movesRemaining, score, starsEarned, boardPhase resources are readable via ecsDb.resources"
      - given: "a transaction updates the score resource"
        should: "the DOM-bridge signal score() reflects the new value within the same tick"
      # bubble-grid
      - given: "game screen mounts with a seeded board"
        should: "8×8 grid of bubble sprites renders; each cell visual ≥41px; each tap target ≥44px"
      - given: "board renders at 390px viewport width"
        should: "board width = 332px (85% of 390); HUD does not overlap board; bottom bar does not overlap board"
      # canvas CoS exit criterion: theme visible at a glance
      - given: "a screenshot is taken at game-screen mount"
        should: "5 distinct bubble types are visually distinguishable (color + emoji icon dual cue)"
    test_loci:
      - describe: "MysteryMunchPlugin: ECS resources init"
        file: "src/game/mysterymunch/state/MysteryMunchPlugin.test.ts"
        cases:
          - "creates movesRemaining resource with default value"
          - "creates score resource with 0"
          - "creates boardPhase resource as idle"
          - "DOM bridge signal reflects ECS resource update"
      - describe: "BoardRenderer: layout budget"
        file: "src/game/mysterymunch/renderers/BoardRenderer.test.ts"
        cases:
          - "board width equals 332px at 390px viewport"
          - "cell visual size ≥41px for 8x8 grid"
          - "cell tap target ≥44px"
          - "board does not overlap HUD (top 120px reserved)"
          - "board does not overlap bottom bar (bottom 96px reserved)"
    files:
      state:
        - src/game/mysterymunch/state/MysteryMunchPlugin.ts
        - src/game/mysterymunch/state/types.ts
        - src/game/state.ts
      integration:
        - src/game/mysterymunch/GameController.ts
        - src/game/mygame/screens/gameController.ts
        - src/game/mysterymunch/renderers/BoardRenderer.ts
        - src/game/mysterymunch/renderers/BlockRenderer.ts
      test:
        - src/game/mysterymunch/state/MysteryMunchPlugin.test.ts
        - src/game/mysterymunch/renderers/BoardRenderer.test.ts
    how:
      - "Create src/game/mysterymunch/ directory tree: state/, renderers/, input/, data/, systems/, screens/"
      - "Write MysteryMunchPlugin.ts with ECS resources (score, movesRemaining, starsEarned, goalProgress, hauntedCellsCleared, clueTilesCollected, boardPhase) and archetypes (Block with cellKind, color, id, row, col, hp fields)"
      - "Replace DOM stub in gameController.ts: switch to gameMode:'pixi', init Pixi Application (resizeTo container, resolution capped at 2), create layer hierarchy (bgLayer, boardLayer, hudLayer, uiLayer), wire pointertap input stub, call setActiveDb + bridgeEcsToSignals on init, call cleanup chain on destroy"
      - "Write BoardRenderer.ts: receives viewportW/H, computes grid offset to center board, renders 8×8 cells using BlockRenderer; reserve top 120px for HUD, bottom 96px for action bar"
      - "Write BlockRenderer.ts: renders individual bubble as emoji Text (color+icon, Amber🌟/Teal💎/Violet🔮/Coral🌸/Lime🍃) in a Container with 41px visual size and 45px hit area; idle wobble GSAP tween on init"
      - "Update src/game/state.ts: add DOM bridge signals for all new ECS resources; keep existing score/level for backward compat during transition"
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at src/game/mysterymunch/GameController.ts and src/game/mygame/screens/gameController.ts"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for canvas (piece ≥48px visual at reference, theme distinct, board/HUD no overlap)"
      - "touch targets ≥44px confirmed in BoardRenderer.test.ts"
      - "screen root elements consume reserved_top_px=0 and reserved_bottom_px=64 as padding (dom_reserved_bottom from prime carry_forward)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
      - "no src/core/ files modified"
      - "no DOM created inside Pixi init (guardrail #1)"
    risk: HIGH
    risk_reason: >
      Central integration point touched simultaneously: ECS plugin, Pixi Application init,
      GameController contract rewrite, and BoardRenderer layout all in one batch. If the Pixi
      init or ECS bridge is wrong, no subsequent batch can proceed. Rollback: keep DOM stub
      in place as a named branch; verify Pixi canvas mounts before wiring ECS. Integration
      test asserts canvas element exists in DOM after init.

  # ─────────────────────────────────────────────────────────────────────────
  # BATCH 2 — Swap interaction + match detection + scoring (core loop unlocked)
  # Player can: drag a bubble to swap with adjacent; see match pop and score increment
  # ─────────────────────────────────────────────────────────────────────────
  - id: 2
    name: "Swap + match detection + base scoring (core loop)"
    priority: P0
    player_visible: >
      Player touches a bubble, drags to an adjacent cell, releases. If a match of 3+
      forms, the matched bubbles pop (200ms dissolve), score increments in HUD.
      If the swap produces no match, bubbles snap back elastically (150ms, thud).
      Move counter decrements on each committed swap. Board state machine enforces
      input blocking during animations.
    features: [swap-interaction, match-rules, score-system, move-counter, board-states]
    cos_covered: [core-interaction, animated-dynamics, scoring]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [bubble-sprite]
      feedback_surfaces: [bubble-sprite, board-cell, swap-animation, score-hud, move-counter]
    acceptance:
      # swap-interaction (core-interaction CoS exit criteria)
      - given: "player drags a bubble ≥15px in a cardinal direction"
        should: "swap is detected on pointermove; slide animation fires immediately; no second gesture needed"
      - given: "player releases after drag <15px"
        should: "no swap triggered; selection highlight clears; state unchanged"
      - given: "player drags a bubble toward the board boundary"
        should: "elastic snap-back fires (≤150ms); move counter NOT decremented; visible feedback not silent"
      - given: "a committed swap produces no 3+ match"
        should: "elastic snap-back fires (≤150ms); move counter NOT decremented; bubbles return to original positions"
      - given: "input arrives during boardPhase=Animating"
        should: "pointer events are ignored (input blocked); board state unchanged"
      # match-rules
      - given: "a committed swap produces a 3-in-a-row match"
        should: "matched cells are cleared with 200ms pop animation; ECS board updated via replaceBoard transaction"
      - given: "a committed swap produces a 5-in-a-line match"
        should: "matchScore = 300 (5-2)*100; score increments by 300"
      # score-system (scoring CoS — multiplicative dimensions)
      - given: "two cascades follow a single swap"
        should: "cascade depth 2 applies chainMultiplier=3; total score > cascade depth 1 scenario"
      - given: "a 3-match at cascade depth 1 is compared to same 3-match at cascade depth 0"
        should: "cascade-depth-1 score is 2× cascade-depth-0 score (chainMultiplier)"
      # move-counter
      - given: "player performs a committed swap"
        should: "movesRemaining decrements by 1; HUD move counter animates to new value"
      - given: "interaction archetype document exists at src/game/mysterymunch/interaction-archetype.md"
        should: "file contains: interaction type, pointer sequence, direction detection, cancel behavior, invalid feedback, feel description"
    test_loci:
      - describe: "SwapHandler: gesture detection"
        file: "src/game/mysterymunch/input/SwapHandler.test.ts"
        cases:
          - "detects swap direction at ≥15px threshold"
          - "does not trigger swap below threshold (no-op release)"
          - "blocks input during Animating board phase"
          - "boundary swap produces snap-back, no move consumed"
          - "invalid (no-match) swap produces snap-back, no move consumed"
      - describe: "matchDetection: match rules"
        file: "src/game/mysterymunch/state/logic/matchDetection.test.ts"
        cases:
          - "detects 3-in-a-row horizontal match"
          - "detects 3-in-a-column vertical match"
          - "ignores 2-in-a-line (no match)"
          - "detects simultaneous row+column match"
      - describe: "scoringLogic: multiplicative dimensions"
        file: "src/game/mysterymunch/state/logic/scoringLogic.test.ts"
        cases:
          - "3-match scores 100, 4-match scores 200, 5-match scores 300"
          - "cascade depth 1 applies x2 chain multiplier"
          - "cascade depth 2 applies x3 chain multiplier"
          - "move efficiency < 1 when extra moves used"
    files:
      state:
        - src/game/mysterymunch/state/logic/matchDetection.ts
        - src/game/mysterymunch/state/logic/scoringLogic.ts
        - src/game/mysterymunch/state/MysteryMunchPlugin.ts
        - src/game/mysterymunch/interaction-archetype.md
      integration:
        - src/game/mysterymunch/input/SwapHandler.ts
        - src/game/mysterymunch/renderers/BoardRenderer.ts
        - src/game/mysterymunch/renderers/HudRenderer.ts
        - src/game/mysterymunch/GameController.ts
      test:
        - src/game/mysterymunch/input/SwapHandler.test.ts
        - src/game/mysterymunch/state/logic/matchDetection.test.ts
        - src/game/mysterymunch/state/logic/scoringLogic.test.ts
    how:
      - "Write SwapHandler.ts: attach pointerdown/pointermove/pointerup on boardLayer; acquire pointer capture on pointerdown; detect cardinal direction at 15px threshold; check boardPhase before acting; dispatch ecsDb.actions.attemptSwap({row,col,dir}); animate slide with GSAP then commit or snap-back based on action return value"
      - "Write matchDetection.ts: pure function, no Pixi imports; scans board for 3+ in row/col; returns matched cell sets keyed by stable bubble ID"
      - "Write scoringLogic.ts: pure function; matchScore=(size-2)*100; chainMultiplier=cascadeDepth+1; specialBonus=0 (batch 5); moveEfficiency=baseMoves/actualMoves; returns levelScore delta"
      - "Add attemptSwap action to MysteryMunchPlugin: calls matchDetection, emits animation events (swap/swap-rejected/match-found/cells-cleared), updates ECS board via replaceBoard transaction, decrements moves on commit"
      - "Write HudRenderer.ts: top strip GPU layer; move counter (large numerals, center); score display (left); star icons (right, 3 ghost emoji); animate move counter decrement with 100ms scale pulse"
      - "Wire boardPhase state machine: Idle→Animating on swap gesture; Animating→Idle after animation queue drains; input blocked in all non-Idle phases"
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at SwapHandler.ts, BoardRenderer.ts, HudRenderer.ts, GameController.ts"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for core-interaction (one-gesture rule, pointer events, visible rejection, input blocking, interaction-archetype.md exists)"
      - "CoS sub-walk clean for animated-dynamics (event queue pattern used; swap animation is GSAP, not instant; match pop animated 200ms)"
      - "CoS sub-walk clean for scoring (multiplicative: matchScore×chainMultiplier; 3× skilled vs beginner verified in test)"
      - "touch targets ≥44px and feedback surfaces present (snap-back, score increment, move counter)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: HIGH
    risk_reason: >
      Core interaction gate: pointer event pipeline, gesture threshold, animation sequencing,
      input blocking, and ECS action are all wired here. If the event queue pattern is missing,
      animated-dynamics CoS fails. Verify: run swap acceptance test before wiring HUD.

  # ─────────────────────────────────────────────────────────────────────────
  # BATCH 3 — Gravity fill + cascade + deadlock detection
  # Player can: see bubbles fall after match; cascades multiply score; board reshuffles on deadlock
  # ─────────────────────────────────────────────────────────────────────────
  - id: 3
    name: "Gravity fill + cascade escalation + deadlock reshuffle"
    priority: P0
    player_visible: >
      After bubbles pop, remaining bubbles fall with physics (80ms/cell, ease-out), landing
      with bounce. New bubbles spawn from top and fall in. If new matches form from the fall,
      they auto-clear with escalating intensity (faster, bigger bounce, edge glow on cascade 2+).
      If no valid swap exists, board shakes, Scooby says 'Ruh-roh!', and bubbles reshuffle.
    features: [gravity-fill, deadlock-detection]
    cos_covered: [animated-dynamics, core-interaction]
    ux_zones:
      thumb_zone: [center]
      touch_targets: []
      feedback_surfaces: [board, bubble-sprites]
    acceptance:
      # gravity-fill (animated-dynamics exit criteria)
      - given: "3 bubbles are cleared from a column"
        should: "bubbles above fall downward; fall duration = 80ms × cells_fallen; ease-out curve; landing bounce scales with distance"
      - given: "top row has empty cells after a fall"
        should: "new bubbles spawn at top and fall in; each new bubble is a distinct object (stable ID, not position-keyed)"
      - given: "all board state resolves before animation starts"
        should: "logic timeline completes first; visual playback reads event queue; no instant state teleport visible"
      # cascade escalation
      - given: "a gravity fill produces a new match (cascade depth 2)"
        should: "cascade depth 2 applies x3 chain multiplier AND animation speed increases AND board edge glow fires"
      - given: "same 3-match occurs at cascade depth 0 vs cascade depth 2"
        should: "cascade-depth-2 score is 3× cascade-depth-0 (chain multiplier scales with depth)"
      # deadlock detection
      - given: "no valid swap exists on the board after a fill"
        should: "board shakes (300ms), Scooby dialogue 'Ruh-roh!' auto-dismisses after 2.5s, bubbles lift/shuffle/land"
      - given: "deadlock reshuffle fires"
        should: "move counter NOT decremented; seeded RNG produces a board with ≥1 valid swap"
      # stable identity check (animated-dynamics exit criterion)
      - given: "a bubble falls 3 rows"
        should: "the same bubble sprite (same GSAP target, same ECS entity ID) is repositioned — not destroyed and recreated"
    test_loci:
      - describe: "gravityFill: cascade and stable identity"
        file: "src/game/mysterymunch/state/logic/gravityFill.test.ts"
        cases:
          - "bubbles above cleared cells fall to fill gaps"
          - "new bubbles are seeded from top into empty rows"
          - "cascade auto-triggers new match after fill"
          - "stable bubble IDs persist through fall (position change, not entity recreate)"
          - "cascade depth increments per chain level"
      - describe: "deadlockDetection: reshuffle"
        file: "src/game/mysterymunch/state/logic/deadlockDetection.test.ts"
        cases:
          - "returns true when no valid swap exists on board"
          - "seeded reshuffle produces board with ≥1 valid swap"
          - "move counter not decremented on reshuffle"
    files:
      state:
        - src/game/mysterymunch/state/logic/gravityFill.ts
        - src/game/mysterymunch/state/logic/deadlockDetection.ts
        - src/game/mysterymunch/state/MysteryMunchPlugin.ts
      integration:
        - src/game/mysterymunch/renderers/BoardRenderer.ts
        - src/game/mysterymunch/GameController.ts
      test:
        - src/game/mysterymunch/state/logic/gravityFill.test.ts
        - src/game/mysterymunch/state/logic/deadlockDetection.test.ts
    how:
      - "Write gravityFill.ts: pure function; after match removal, compute gravity-drop events (cell, distance) for each bubble above cleared cells; compute new-bubble-entry events for empty top slots; return event queue; use seeded RNG for new bubble colors; enforce color-minimum: if <3 of any needed color remain, bias RNG to refill"
      - "Extend MysteryMunchPlugin action chain: after match-clear, run gravityFill, check for new matches (cascade), append events to queue; cascade loop exits when no new matches; boardPhase returns to Idle only after full queue drains"
      - "Extend BoardRenderer: play gravity-drop events using GSAP (ease-out, duration=80ms×distance); landing squash/stretch with magnitude scaled to distance; cascade depth 2 triggers GSAP boardEdgeGlow tween (alpha 0→0.8→0, orange tint); cascade depth 3+ triggers screen-shake (GSAP wiggle on stage)"
      - "Write deadlockDetection.ts: pure function; scans all possible swaps; if count=0 trigger reshuffle; reshuffle uses seeded RNG (Fisher-Yates on bubble array); validate result has ≥1 valid swap; if not, retry (up to 10 times)"
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at BoardRenderer.ts and GameController.ts"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for animated-dynamics (event queue, stable IDs, physics gravity, cascade escalation)"
      - "CoS sub-walk clean for core-interaction (input blocked during cascade animations)"
      - "bun run build + bun run test:run pass within 3 fix cycles"
    risk: MEDIUM
    risk_reason: >
      Cascade loop could create infinite recursion if termination condition is wrong. Board-diff
      stable-ID animation is the most commonly broken animated-dynamics invariant. Verify:
      unit test asserts same ECS entity ID before and after fall.

  # ─────────────────────────────────────────────────────────────────────────
  # BATCH 4 — Win/loss conditions + move counter zero state + HUD polish
  # Player can: win (see fanfare) or lose (see gentle overlay) and transition to results screen
  # ─────────────────────────────────────────────────────────────────────────
  - id: 4
    name: "Win/loss conditions + move-zero state + continue system"
    priority: P0
    player_visible: >
      When all haunted cells are cleared AND clue tiles collected: board freezes, win fanfare
      jingle, stars pop in (3 × 300ms), score shown, 'Next Level' button. When moves hit 0
      without win: counter shakes (100ms), board dims to 60%, soft overlay fades in ('Almost
      there, pal!'), 3 options stagger in. Continue: board unfreezes, +5 moves animates in.
    features: [win-condition, loss-condition, continue-system, haunted-cells, clue-tiles, star-rating]
    cos_covered: [core-interaction, scoring, canvas, animated-dynamics]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [next-level-button, replay-button, keep-going-button, use-coins-button, try-next-time-button]
      feedback_surfaces: [board, hud-strip, loss-overlay, star-animations, clue-tray]
    acceptance:
      # haunted-cells
      - given: "board contains a haunted cell (ghost-fog overlay)"
        should: "cell visually distinct (ghost-fog emoji/tint overlay); participates in matches normally; adjacent match clears the haunt with animated fog dissipation"
      # clue-tiles
      - given: "a haunted cell is cleared revealing a clue tile"
        should: "400ms float animation plays from cell position to HUD clue tray; clue thumbnail appears in tray slot"
      # win-condition
      - given: "all haunted cells cleared AND all required clue tiles in tray"
        should: "boardPhase transitions to Won; board freezes (input blocked); win fanfare sequence fires (8 steps)"
      - given: "win sequence fires"
        should: "stars animate sequentially (300ms each, bouncy ease); score counter animates to final value"
      # loss-condition
      - given: "movesRemaining hits 0 and win condition not met"
        should: "move counter shakes (100ms); board dims to 60% (200ms); soft overlay fades in (250ms); no countdown"
      - given: "loss overlay is visible"
        should: "'Almost there, pal!' copy shown (not 'GAME OVER'); 3 options present; each option ≥44px tap target"
      # continue-system
      - given: "player taps 'Keep Going'"
        should: "overlay dismisses; board unfreezes; move counter increments by 5 with animation; input re-enabled"
      - given: "player taps 'Try Next Time'"
        should: "goto('start') called; no coins deducted"
      # star-rating (scoring CoS)
      - given: "win screen appears"
        should: "star count matches score thresholds defined in level config; stars pop in sequentially not simultaneously"
      # results screen navigation (valid screen ID check)
      - given: "win sequence completes"
        should: "goto('results') is called with win-branch state; results screen shows 'Next Level' button"
    test_loci:
      - describe: "hauntedCells: clear mechanic"
        file: "src/game/mysterymunch/state/logic/hauntedCells.test.ts"
        cases:
          - "adjacent match clears haunted status"
          - "non-adjacent match does not clear haunted cell"
          - "cleared haunted cell reveals normal cell (or clue tile)"
      - describe: "clueTiles: collection"
        file: "src/game/mysterymunch/state/logic/clueTiles.test.ts"
        cases:
          - "clue tile collects on haunted-cell clear"
          - "clueTilesCollected ECS resource increments"
      - describe: "winCondition: primary path"
        file: "src/game/mysterymunch/state/logic/winCondition.test.ts"
        cases:
          - "win fires when all haunted cells cleared AND all required clues collected"
          - "win does not fire if haunted cells remain"
          - "win does not fire if clues incomplete"
      - describe: "lossCondition: move-zero path"
        file: "src/game/mysterymunch/state/logic/lossCondition.test.ts"
        cases:
          - "loss fires when movesRemaining = 0 and win not met"
          - "loss does not fire when movesRemaining = 0 and win condition met"
      - describe: "ContinueSystem: +5 moves path"
        file: "src/game/mysterymunch/systems/ContinueSystem.test.ts"
        cases:
          - "Keep Going grants +5 moves; board phase returns to Idle"
          - "Use Snack Coins deducts 30 coins and grants +5 moves"
          - "Try Next Time calls goto('start')"
    files:
      state:
        - src/game/mysterymunch/state/logic/hauntedCells.ts
        - src/game/mysterymunch/state/logic/clueTiles.ts
        - src/game/mysterymunch/state/logic/winCondition.ts
        - src/game/mysterymunch/state/logic/lossCondition.ts
        - src/game/mysterymunch/state/MysteryMunchPlugin.ts
      integration:
