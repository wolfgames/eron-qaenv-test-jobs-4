  - id: score-system
    name: "Scoring System — Match Size + Chain + Special Bonuses"
    status: new
    lifecycle_phase: PLAY
    risk: LOW
    complexity: med
    cos_required: [scoring]
    ux_zones:
      thumb_zone: out-of-reach
      touch_targets: []
      feedback_surfaces: [hud-strip, score-counter]
    affected_files:
      - <game-root>/state/logic/scoringLogic.ts
      - <game-root>/state/MysteryMunchPlugin.ts
    dependencies: [match-rules, special-bubbles, state-signals]
    ux:
      discovery: "Score visible in HUD; increments on every match"
      feedback: "Score counter animates to new value on each match"
      onboarding: "Score feedback correlates size of match to size of increment"
    notes: >
      Multi-dimensional scoring per CoS scoring:
      matchScore = (matchSize - 2) * 100 (3=100, 4=200, 5=300+)
      chainMultiplier = cascadeDepth + 1 (first=x1, cascade=x2, x3...)
      specialBonus = 500 per special triggered
      moveEfficiency = baseMoves / actualMoves
      levelScore = (matchScore * chainMultiplier + specialBonus) * moveEfficiency
      1–3 stars at score thresholds (cosmetic only, no progression gate).
      Stars: pure display. Score targets per level defined in level data.

