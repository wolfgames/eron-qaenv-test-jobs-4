    ux:
      discovery: "Ghost-finger pointer in Tutorial 1 demos the gesture"
      feedback: "Slide animation on valid swap; elastic snap-back with thud on invalid"
      onboarding: "Tutorial Level 1: constrained board teaches one swap gesture"
    notes: >
      Input: drag one bubble to adjacent (up/down/left/right — no diagonal).
      One continuous gesture (finger-down → drag → release). Swap detected on pointermove
      at ~15px threshold, then animated. If no match: snap-back 150ms ease-in-out, no move consumed.
      Boundary swaps rejected with snap-back. Input blocked during animation.
      GDD specifies exact behavior: must use Pixi pointer events, touch-action:none on container.

