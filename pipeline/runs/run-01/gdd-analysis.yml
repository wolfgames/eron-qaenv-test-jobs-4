game: "Mystery Munch (Scooby-Doo Bubble Pop Adventure)"
counts:
  exists: 0
  partial: 2
  new: 22
  conflict: 3
  content_gap: 4
conflict_breakdown:
  reuse: 1
  adapt: 2
  replace: 0
high_risk: 4
open_questions: 5

