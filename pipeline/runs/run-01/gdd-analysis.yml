risk_areas:
  - feature: game-controller
    reason: "Central integration point — ECS init, Pixi app init, input routing, lifecycle. All batch-1 features depend on this being correct."
  - feature: bubble-grid
    reason: "Touches renderer, state, level-gen, HUD — board layout decisions cascade to viewport budget and all downstream features."
  - feature: swap-interaction
    reason: "Core input mechanism; pointer events, gesture detection, animation sequencing, input blocking — directly gates core-interaction CoS."
  - feature: level-generation
    reason: "7-step procedural algorithm with solvability check, seeded RNG, 6 rejection conditions — high implementation surface, no precedent in scaffold."
  - feature: board-states
    reason: "State machine governs all input blocking — if wrong, player can interrupt animations; breaks core-interaction CoS."

open_questions:
  - id: oq-ad-integration
    question: "What ad network does 'Watch Ad for +5 moves' use? Is there a scaffold or SDK already integrated, or is this stubbed for core pass?"
    context: "GDD specifies 'Watch Ad → +5 moves' as a continue option. No ad SDK visible in scaffold. Core pass may need to stub this as a no-op or mock."

  - id: oq-snack-coins-scope
    question: "Are Snack Coins (meta-currency for continue) a core-pass concern or deferred to a later pass? How is the currency balance persisted?"
    context: "GDD references 'Snack Coins' as a spendable currency for continues. No persistence layer visible in scaffold. Core pass should clarify scope."

  - id: oq-villain-reveal-assets
    question: "Are villain reveal/unmask animations sprite-based (atlas) or procedural? How many villains are authored for launch (5 chapters)?"
    context: "GDD describes an 'animated unmask sequence' for chapter complete. Asset complexity depends on answer — affects asset manifest planning."

  - id: oq-chapter-map-navigation
    question: "Does the 'level select / chapter map' screen referenced in the Loss Screen ('Try Next Time → returns to Chapter map / level select') map to an existing scaffold screen ID, or is it a new overlay?"
    context: "GDD mentions 'chapter map' but only 4 valid screen IDs exist (loading/start/game/results). A chapter-map screen would violate the scaffold constraint. Resolution needed: overlay on results? Or is 'start' screen repurposed?"

  - id: oq-color-alone-accessibility
    question: "Bubbles are distinguished primarily by color. Is a colorblind mode (tint override + icon/pattern) in scope for core pass, or deferred?"
    context: "UX core-guidelines.md requires not relying on color alone. GDD specifies 5 bubble colors with no explicit colorblind fallback. Core pass must at minimum plan for icon/shape secondary cue on each bubble."

